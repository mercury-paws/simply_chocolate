<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simply_Chocolate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="node_modules/modern-normalize/modern-normalize.css"
    />
    <link rel="stylesheet" href="/simply_chocolate/css/styles.css" />
  </head>
  <body>
    <header class="header-section">
      <div class="container-header">
        <div class="logo-icon">
          <a href="/simply_chocolate/index.html" class="logo-header"
            ><span class="spetial-logo-style">simply</span> chocolate</a
          >
          <svg class="main-icon" width="21" height="21">
            <use href="./images/icons.svg#icon-chocolate"></use>
          </svg>
        </div>
        <button type="button" class="burger-button">
          <svg class="mobile-menu" width="28" height="28">
            <use href="./images/icons.svg#icon-menu"></use>
          </svg>
        </button>
        <div class="navigation-social">
          <nav class="navigation-block">
            <ul class="menu">
              <li class="menu-navigation-list">
                <a href="/simply_chocolate/index.html" class="menu-link-header">Home</a>
              </li>
              <li class="menu-navigation-list">
                <a href="#made" class="menu-link-header">How it's made?</a>
              </li>
              <li class="menu-navigation-list">
                <a href="#loved" class="menu-link-header">Chocolate is loved</a>
              </li>
            </ul>
          </nav>
          <address class="social-links">
            <svg class="social-links-icon inst" width="24" height="24">
              <use
                href="/simply_chocolate/images/icons.svg#icon-instagram"
              ></use>
            </svg>
            <svg class="social-links-icon" width="24" height="24">
              <use href="/simply_chocolate/images/icons.svg#icon-twitter"></use>
            </svg>
          </address>
        </div>
      </div>
      <div class="backdrop-mobile-menu">
        <div class="modal-user">
          <button type="button" class="close-icon-button">
            <svg width="28" height="28" class="close-icon-mobile-menu">
              <use
                href="/simply_chocolate/images/icons.svg#close-mobile-menu"
              ></use>
            </svg>
          </button>
            <ul class="menu-mob-menu">
              <li class="menu-navigation-list-mob-menu stroke">
                <a href="/simply_chocolate/index.html" class="stroke">Home</a>
              </li>
              <li class="menu-navigation-list-mob-menu">
                <a href="" class="nav-link">How it's made?</a>
              </li>
              <li class="menu-navigation-list-mob-menu">
                <a href="" class="nav-link">Chocolate is loved</a>
              </li>
            </ul>
          </nav>
          <address class="social-links-mob-backdrop">
            <svg class="social-links-icon-mob-backdrop inst" width="24" height="24">
              <use
                href="/simply_chocolate/images/icons.svg#icon-instagram"
              ></use>
            </svg>
            <svg class="social-links-icon-mob-backdrop" width="24" height="24">
              <use href="/simply_chocolate/images/icons.svg#icon-twitter"></use>
            </svg>
          </address>
        </div>
      </div>
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
